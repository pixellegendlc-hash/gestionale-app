<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gestionale">
<meta name="theme-color" content="#080e1a">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<link rel="manifest" href="/static/manifest.json">
<title>Gestionale</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/static/css/app.css">
</head>
<body>

<div id="topbar">
  <div class="topbar-logo">Gestio<span>nale</span></div>
  <button class="topbar-icon" onclick="toggleSearch()"><i class="fa fa-magnifying-glass"></i></button>
  <button class="topbar-icon" id="riepilogo-btn" onclick="Finanze.showRiepilogo()" style="display:none"><i class="fa fa-chart-pie"></i></button>

</div>
<div id="search-bar">
  <input id="search-input" type="search" placeholder="Cerca..." oninput="onSearch(this.value)">
</div>

<!-- TASK -->
<div class="page active" id="page-tasks">
  <div class="sub-tabs">
    <div class="sub-tab task-sub-tab active" onclick="Tasks.setTab('attivi',this)">Attivi</div>
    <div class="sub-tab task-sub-tab" onclick="Tasks.setTab('completati',this)">✓ Completati</div>
    <div class="sub-tab task-sub-tab" onclick="Tasks.setTab('falliti',this)">✗ Falliti</div>
  </div>
  <div class="filters" id="task-filters">
    <button class="filter-chip active" onclick="Tasks.setPri('Tutti',this)">Tutti</button>
    <button class="filter-chip" onclick="Tasks.setPri('molto_Alta',this)">🔴 Urgente</button>
    <button class="filter-chip" onclick="Tasks.setPri('Alta',this)">🟠 Alta</button>
    <button class="filter-chip" onclick="Tasks.setPri('Media',this)">🟡 Media</button>
    <button class="filter-chip" onclick="Tasks.setPri('Bassa',this)">🟢 Bassa</button>
  </div>
  <div id="tasks-list"></div>
</div>

<!-- FINANZE -->
<div class="page" id="page-finanze">
  <div class="summary">
    <div class="sum-card"><div class="sum-val col-green" id="fin-entrate">—</div><div class="sum-lbl">Entrate</div></div>
    <div class="sum-card"><div class="sum-val col-red"   id="fin-uscite">—</div><div class="sum-lbl">Uscite</div></div>
    <div class="sum-card"><div class="sum-val"           id="fin-saldo">—</div><div class="sum-lbl">Saldo</div></div>
  </div>
  <div class="filters" id="fin-filters">
    <button class="filter-chip active" onclick="Finanze.setTipo('Tutti',this)">Tutti</button>
    <button class="filter-chip" onclick="Finanze.setTipo('Entrata',this)">↑ Entrate</button>
    <button class="filter-chip" onclick="Finanze.setTipo('Uscita',this)">↓ Uscite</button>
  </div>
  <div id="finanze-list"></div>
</div>

<!-- APPUNTI -->
<div class="page" id="page-appunti">
  <div id="appunti-list-view"><div id="appunti-list"></div></div>
  <div id="appunti-detail-view" style="display:none">
    <button onclick="Appunti.showList();Appunti.load()" style="background:none;border:none;color:var(--accent);font-size:14px;font-weight:700;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;gap:6px">
      <i class="fa fa-arrow-left"></i> Appunti
    </button>
    <div class="card note-default">
      <div id="detail-title" style="font-size:20px;font-weight:800;margin-bottom:6px"></div>
      <div id="detail-date"  style="font-size:12px;color:var(--text3);margin-bottom:16px"></div>
      <div id="detail-content" class="note-content"></div>
    </div>
    <div class="btn-row" style="margin-top:10px">
      <button class="btn btn-ghost"   onclick="Appunti.editCurrent()"><i class="fa fa-pen"></i> Modifica</button>
      <button class="btn btn-danger"  onclick="Appunti.delCurrent()"><i class="fa fa-trash"></i> Elimina</button>
    </div>
    <div id="detail-history"></div>
  </div>
</div>

<!-- FOTO -->
<div class="page" id="page-photos">
  <div class="filters" id="photos-groups"></div>
  <div style="display:flex;gap:8px;margin-bottom:14px">
    <input id="new-group-name" placeholder="Nuovo gruppo..." style="flex:1;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none">
    <button onclick="Photos.createGroup()" style="background:var(--accent-dim);color:var(--accent);border:1px solid #4f7bff33;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer"><i class="fa fa-plus"></i></button>
  </div>
  <div class="photo-grid" id="photos-grid"></div>
</div>

<!-- STATS -->
<div class="page" id="page-stats">
  <div id="stats-content"><div class="loader"><div class="spinner"></div></div></div>
</div>

<!-- NAV -->
<nav id="nav">
  <button class="nav-btn active" onclick="goPage('tasks',this);document.getElementById('riepilogo-btn').style.display='none'">
    <i class="fa fa-list-check"></i>Task
  </button>
  <button class="nav-btn" onclick="goPage('finanze',this);document.getElementById('riepilogo-btn').style.display='flex'">
    <i class="fa fa-euro-sign"></i>Finanze
  </button>
  <button class="nav-btn" onclick="goPage('appunti',this);document.getElementById('riepilogo-btn').style.display='none'">
    <i class="fa fa-sticky-note"></i>Appunti
  </button>
  <button class="nav-btn" onclick="goPage('photos',this);document.getElementById('riepilogo-btn').style.display='none'">
    <i class="fa fa-images"></i>Foto
  </button>
  <button class="nav-btn" onclick="goPage('stats',this);document.getElementById('riepilogo-btn').style.display='none'">
    <i class="fa fa-chart-line"></i>Stats
  </button>
</nav>

<button class="fab" id="main-fab" onclick="fabClick()"><i class="fa fa-plus"></i></button>

<!-- LIGHTBOX -->
<div id="lightbox">
  <div id="lightbox-toolbar">
    <button onclick="Photos.closeLightbox()" style="background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer"><i class="fa fa-arrow-left"></i></button>
    <div id="lightbox-name"></div>
    <button id="lightbox-del" onclick="Photos.deleteCurrentPhoto()"><i class="fa fa-trash"></i> Elimina</button>
  </div>
  <div id="lightbox-img"><img id="lightbox-img-el" src="" alt=""></div>
</div>

<div id="toast"></div>

<!-- MODAL TASK -->
<div class="modal-bg" id="modal-task">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="task-modal-title">Nuovo Task</div>
    <input type="hidden" id="t-id">
    <div class="form-row"><label>Nome Task *</label><input id="t-nome" type="text" placeholder="Descrivi il task..."></div>
    <div class="form-2col">
      <div class="form-row"><label>Scadenza</label><input id="t-scadenza" type="date"></div>
      <div class="form-row"><label>Priorità</label>
        <select id="t-priorita">
          <option value="molto_Alta">🔴 Molto Alta</option>
          <option value="Alta">🟠 Alta</option>
          <option value="Media" selected>🟡 Media</option>
          <option value="Bassa">🟢 Bassa</option>
        </select>
      </div>
    </div>
    <div class="form-row"><label>Stato</label>
      <select id="t-stato">
        <option>Da Iniziare</option><option>In Progresso</option>
        <option>Completato</option><option>Falliti</option>
      </select>
    </div>
    <div class="form-row"><label>Note</label><textarea id="t-note" placeholder="Note aggiuntive..." style="min-height:70px"></textarea></div>
    <div class="btn-row">
      <button class="btn btn-ghost"   onclick="closeModal('modal-task')">Annulla</button>
      <button class="btn btn-primary" onclick="Tasks.save()"><i class="fa fa-floppy-disk"></i> Salva</button>
    </div>
  </div>
</div>

<!-- MODAL FINANZA -->
<div class="modal-bg" id="modal-finanza">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="fin-modal-title">Nuova Voce</div>
    <input type="hidden" id="f-id">
    <div class="form-row"><label>Descrizione *</label><input id="f-desc" type="text" placeholder="Es: Pagamento fornitore..."></div>
    <div class="form-2col">
      <div class="form-row"><label>Importo (€) *</label><input id="f-importo" type="number" min="0" step="0.01" placeholder="0.00"></div>
      <div class="form-row"><label>Tipo</label>
        <select id="f-tipo"><option>Entrata</option><option selected>Uscita</option></select>
      </div>
    </div>
    <div class="form-2col">
      <div class="form-row"><label>Categoria</label>
        <select id="f-categoria">
          <option>Altro</option><option>Stipendi</option><option>Materiali</option>
          <option>Utenze</option><option>Marketing</option><option>Vendite</option>
          <option>Affitto</option><option>Tasse</option><option>Software</option>
        </select>
      </div>
      <div class="form-row"><label>Data</label><input id="f-data" type="date"></div>
    </div>
    <div class="form-row"><label>Note</label><input id="f-note" type="text" placeholder="Opzionale..."></div>
    <div class="btn-row">
      <button class="btn btn-ghost"   onclick="closeModal('modal-finanza')">Annulla</button>
      <button class="btn btn-primary" onclick="Finanze.save()"><i class="fa fa-floppy-disk"></i> Salva</button>
    </div>
  </div>
</div>

<!-- MODAL APPUNTO -->
<div class="modal-bg" id="modal-appunto">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="note-modal-title">Nuovo Appunto</div>
    <input type="hidden" id="n-id">
    <div class="form-row"><label>Titolo *</label><input id="n-titolo" type="text" placeholder="Titolo appunto..."></div>
    <div class="form-row"><label>Contenuto</label><textarea id="n-contenuto" placeholder="Scrivi qui..."></textarea></div>
    <div class="form-row"><label>Colore</label>
      <select id="n-colore">
        <option value="default">🔵 Default</option>
        <option value="red">🔴 Rosso</option>
        <option value="green">🟢 Verde</option>
        <option value="yellow">🟡 Giallo</option>
        <option value="purple">🟣 Viola</option>
      </select>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost"   onclick="closeModal('modal-appunto')">Annulla</button>
      <button class="btn btn-primary" onclick="Appunti.save()"><i class="fa fa-floppy-disk"></i> Salva</button>
    </div>
  </div>
</div>

<!-- MODAL UPLOAD FOTO -->
<div class="modal-bg" id="modal-upload">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Carica Foto</div>
    <div class="upload-area" onclick="document.getElementById('photo-file-input').click()">
      <i class="fa fa-cloud-arrow-up"></i>
      Tocca per selezionare foto
      <div style="font-size:12px;color:var(--text3);margin-top:6px">JPG, PNG, GIF, WebP</div>
    </div>
    <input id="photo-file-input" type="file" accept="image/*" multiple style="display:none" onchange="Photos.onFileSelect(this)">
    <div id="upload-preview" style="margin-bottom:14px"></div>
    <div class="form-row"><label>Gruppo (opzionale)</label><input id="upload-group" type="text" placeholder="Es: Lavori, Clienti..."></div>
    <div class="btn-row">
      <button class="btn btn-ghost"   onclick="closeModal('modal-upload')">Annulla</button>
      <button class="btn btn-primary" id="upload-btn" onclick="Photos.doUpload()"><i class="fa fa-upload"></i> Carica</button>
    </div>
  </div>
</div>

<!-- MODAL RIEPILOGO -->
<div class="modal-bg" id="modal-riepilogo">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">📊 Riepilogo Mensile</div>
    <div id="riepilogo-list"></div>
    <div class="btn-row"><button class="btn btn-ghost" onclick="closeModal('modal-riepilogo')">Chiudi</button></div>
  </div>
</div>

<!-- MODAL CONFIRM -->
<div class="modal-bg" id="modal-confirm">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Conferma eliminazione</div>
    <p style="color:var(--text2);margin-bottom:20px;font-size:14px">Questa operazione non può essere annullata.</p>
    <div class="btn-row">
      <button class="btn btn-ghost"  onclick="closeModal('modal-confirm')">Annulla</button>
      <button class="btn btn-danger" id="confirm-yes"><i class="fa fa-trash"></i> Elimina</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="/static/js/app.js"></script>
<script src="/static/js/tasks.js"></script>
<script src="/static/js/finanze.js"></script>
<script src="/static/js/appunti.js"></script>
<script src="/static/js/photos.js"></script>
<script src="/static/js/stats.js"></script>

</body>
</html>
