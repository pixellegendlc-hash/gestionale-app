<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1923">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gestionale">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<link rel="manifest" href="/static/manifest.json">
<title>Gestionale</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:       #0f1923;
    --surface:  #162130;
    --card:     #1c2d3e;
    --border:   #2a3d50;
    --accent:   #3b8beb;
    --accent2:  #2dd4bf;
    --text:     #e2e8f0;
    --muted:    #7a9ab5;
    --red:      #e74c3c;
    --orange:   #ff7514;
    --yellow:   #f1c40f;
    --green:    #2ecc71;
    --nav-h:    64px;
    --top-h:    58px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100dvh; overflow: hidden; }

  /* ── TOP BAR ── */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; height: var(--top-h);
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 100;
  }
  #topbar h1 { font-size: 18px; font-weight: 700; flex: 1; }
  #topbar h1 span { color: var(--accent); }
  #btn-search-top { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 8px; }

  /* ── BOTTOM NAV ── */
  #nav {
    position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h);
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; z-index: 100;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 4px; border: none; background: none;
    color: var(--muted); font-size: 11px; cursor: pointer; transition: color .2s;
    padding: 8px 0;
  }
  .nav-btn i { font-size: 20px; }
  .nav-btn.active { color: var(--accent); }

  /* ── PAGES ── */
  .page { position: fixed; top: var(--top-h); bottom: var(--nav-h); left: 0; right: 0; overflow-y: auto; padding: 12px; display: none; }
  .page.active { display: block; }

  /* ── CARDS ── */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .card-title { font-weight: 600; font-size: 15px; margin-bottom: 6px; }
  .badge { display: inline-block; border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 600; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 6px; }

  /* ── PRIORITY COLORS ── */
  .pri-molto_Alta { background: #e74c3c22; border-left: 4px solid #e74c3c; }
  .pri-Alta       { background: #ff751422; border-left: 4px solid #ff7514; }
  .pri-Media      { background: #f1c40f22; border-left: 4px solid #f1c40f; }
  .pri-Bassa      { background: #2ecc7122; border-left: 4px solid #2ecc71; }
  .badge-molto_Alta { background: #e74c3c33; color: #e74c3c; }
  .badge-Alta       { background: #ff751433; color: #ff7514; }
  .badge-Media      { background: #f1c40f33; color: #f1c40f; }
  .badge-Bassa      { background: #2ecc7133; color: #2ecc71; }

  /* ── STATO BADGES ── */
  .stato-Da\ Iniziare { background: #3b8beb22; color: #3b8beb; }
  .stato-In\ Progresso{ background: #f1c40f22; color: #f1c40f; }
  .stato-Completato   { background: #2ecc7122; color: #2ecc71; }
  .stato-Falliti      { background: #e74c3c22; color: #e74c3c; }

  /* ── TIPO FINANZA ── */
  .tipo-Entrata { color: var(--green); }
  .tipo-Uscita  { color: var(--red); }

  /* ── FILTERS ── */
  .filters { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn { flex-shrink: 0; border: 1px solid var(--border); background: var(--card); color: var(--muted); border-radius: 20px; padding: 6px 14px; font-size: 13px; cursor: pointer; transition: all .2s; }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── FAB ── */
  .fab { position: fixed; bottom: calc(var(--nav-h) + 16px); right: 16px; width: 56px; height: 56px; border-radius: 50%; background: var(--accent); border: none; color: #fff; font-size: 24px; cursor: pointer; box-shadow: 0 4px 16px #3b8beb55; display: flex; align-items: center; justify-content: center; z-index: 90; transition: transform .15s; }
  .fab:active { transform: scale(0.92); }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; color: var(--muted); padding: 40px 20px; }
  .empty i { font-size: 48px; margin-bottom: 12px; opacity: .4; }

  /* ── MODAL ── */
  .modal-bg { position: fixed; inset: 0; background: #000a; display: none; z-index: 200; align-items: flex-end; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-height: 90dvh; overflow-y: auto; padding: 20px; }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 18px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 12px 14px; background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 15px; outline: none;
  }
  .form-group textarea { min-height: 100px; resize: vertical; font-family: inherit; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group select option { background: var(--card); }
  .modal-actions { display: flex; gap: 10px; margin-top: 6px; }
  .btn { flex: 1; padding: 13px; border-radius: 10px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
  .btn:active { opacity: .8; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-danger  { background: var(--red); color: #fff; }
  .btn-ghost   { background: var(--card); color: var(--text); border: 1px solid var(--border); }

  /* ── STATS ── */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; text-align: center; }
  .stat-val { font-size: 28px; font-weight: 700; }
  .stat-lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }
  canvas { max-width: 100%; }

  /* ── SUMMARY STRIP ── */
  .summary-strip { display: flex; gap: 8px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 12px; }
  .sum-item { flex: 1; text-align: center; }
  .sum-val  { font-size: 16px; font-weight: 700; }
  .sum-lbl  { font-size: 11px; color: var(--muted); }

  /* ── NOTE DETAIL ── */
  .note-content { white-space: pre-wrap; font-size: 15px; line-height: 1.6; }
  .note-meta { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* ── URGENTI BADGE ── */
  .scaduto-badge { background: #9b59b622; color: #9b59b6; }
  .urgente-badge { background: #3b8beb22; color: #3b8beb; }

  /* ── SEARCH BAR ── */
  #search-bar { display: none; padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
  #search-bar.open { display: block; }
  #search-input { width: 100%; padding: 10px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 15px; outline: none; }

  /* ── SWIPE ACTIONS ── */
  .task-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .act-btn { flex: 1; min-width: 90px; padding: 8px 6px; border-radius: 8px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .act-btn:active { opacity: .8; }
  .act-complete { background: #2ecc7122; color: #2ecc71; border: 1px solid #2ecc7144; }
  .act-fail     { background: #e74c3c22; color: #e74c3c; border: 1px solid #e74c3c44; }
  .act-edit     { background: #3b8beb22; color: #3b8beb; border: 1px solid #3b8beb44; }
  .act-delete   { background: #e74c3c22; color: #e74c3c; border: 1px solid #e74c3c44; }
  .act-restore  { background: #f1c40f22; color: #f1c40f; border: 1px solid #f1c40f44; }

  /* ── TABS (sub) ── */
  .sub-tabs { display: flex; gap: 0; margin-bottom: 12px; background: var(--card); border-radius: 10px; padding: 4px; }
  .sub-tab { flex: 1; text-align: center; padding: 8px; border-radius: 8px; font-size: 13px; cursor: pointer; color: var(--muted); transition: all .2s; }
  .sub-tab.active { background: var(--accent); color: #fff; }

  /* ── LOADER ── */
  .loader { display: flex; justify-content: center; padding: 30px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <h1>Gestio<span>nale</span></h1>
  <button id="btn-search-top" onclick="toggleSearch()"><i class="fa fa-search"></i></button>
</div>
<div id="search-bar">
  <input id="search-input" type="search" placeholder="Cerca task, appunti, finanze..." oninput="globalSearch(this.value)">
</div>

<!-- PAGES -->
<div class="page active" id="page-tasks">
  <div class="sub-tabs">
    <div class="sub-tab active" onclick="setTaskTab('attivi',this)">Attivi</div>
    <div class="sub-tab" onclick="setTaskTab('completati',this)">✓ Completati</div>
    <div class="sub-tab" onclick="setTaskTab('falliti',this)">✗ Falliti</div>
  </div>
  <div class="filters" id="filters-priority">
    <button class="filter-btn active" onclick="setPriorityFilter('Tutti',this)">Tutti</button>
    <button class="filter-btn" onclick="setPriorityFilter('molto_Alta',this)">🔴 Urgente</button>
    <button class="filter-btn" onclick="setPriorityFilter('Alta',this)">🟠 Alta</button>
    <button class="filter-btn" onclick="setPriorityFilter('Media',this)">🟡 Media</button>
    <button class="filter-btn" onclick="setPriorityFilter('Bassa',this)">🟢 Bassa</button>
  </div>
  <div id="tasks-list"></div>
</div>

<div class="page" id="page-finanze">
  <div id="fin-summary" class="summary-strip">
    <div class="sum-item"><div class="sum-val tipo-Entrata" id="fin-entrate">—</div><div class="sum-lbl">Entrate mese</div></div>
    <div class="sum-item"><div class="sum-val tipo-Uscita" id="fin-uscite">—</div><div class="sum-lbl">Uscite mese</div></div>
    <div class="sum-item"><div class="sum-val" id="fin-saldo">—</div><div class="sum-lbl">Saldo netto</div></div>
  </div>
  <div class="filters" id="filters-tipo">
    <button class="filter-btn active" onclick="setTipoFilter('Tutti',this)">Tutti</button>
    <button class="filter-btn" onclick="setTipoFilter('Entrata',this)">↑ Entrate</button>
    <button class="filter-btn" onclick="setTipoFilter('Uscita',this)">↓ Uscite</button>
  </div>
  <div id="finanze-list"></div>
</div>

<div class="page" id="page-appunti">
  <div id="appunti-list"></div>
  <div id="appunto-detail" style="display:none">
    <button onclick="backToNotes()" style="background:none;border:none;color:var(--accent);font-size:15px;margin-bottom:12px;cursor:pointer"><i class="fa fa-arrow-left"></i> Appunti</button>
    <div class="card">
      <div id="note-title" class="card-title" style="font-size:18px"></div>
      <div id="note-meta" class="note-meta"></div>
      <hr style="border-color:var(--border);margin:12px 0">
      <div id="note-content" class="note-content"></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:10px">
      <button class="btn btn-primary" onclick="editNoteDetail()"><i class="fa fa-edit"></i> Modifica</button>
      <button class="btn btn-danger" onclick="deleteNoteDetail()"><i class="fa fa-trash"></i> Elimina</button>
    </div>
  </div>
</div>

<div class="page" id="page-stats">
  <div class="stats-grid" id="stats-grid"></div>
  <div class="card" style="margin-bottom:10px">
    <div style="font-weight:600;margin-bottom:10px">Task per Stato</div>
    <canvas id="chart-stati"></canvas>
  </div>
  <div class="card">
    <div style="font-weight:600;margin-bottom:10px">Andamento Finanziario (6 mesi)</div>
    <canvas id="chart-fin"></canvas>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav id="nav">
  <button class="nav-btn active" onclick="goPage('tasks',this)"><i class="fa fa-list-check"></i>Task</button>
  <button class="nav-btn" onclick="goPage('finanze',this)"><i class="fa fa-euro-sign"></i>Finanze</button>
  <button class="nav-btn" onclick="goPage('appunti',this)"><i class="fa fa-sticky-note"></i>Appunti</button>
  <button class="nav-btn" onclick="goPage('stats',this)"><i class="fa fa-chart-line"></i>Stats</button>
</nav>

<!-- FAB -->
<button class="fab" id="fab" onclick="openAddModal()"><i class="fa fa-plus"></i></button>

<!-- ══════════════════════ MODALS ══════════════════════ -->

<!-- MODAL TASK -->
<div class="modal-bg" id="modal-task">
  <div class="modal">
    <div class="modal-title" id="modal-task-title">Nuovo Task</div>
    <input type="hidden" id="task-edit-id" value="">
    <div class="form-group"><label>Nome Task *</label><input id="t-nome" type="text" placeholder="Descrivi il task..."></div>
    <div class="form-group"><label>Assegnato a</label>
      <select id="t-assegnato">
        <option>Luca</option><option>Cristian</option><option>Luca-Cristian</option><option>N/D</option>
      </select>
    </div>
    <div class="form-group"><label>Scadenza</label><input id="t-scadenza" type="date"></div>
    <div class="form-group"><label>Priorità</label>
      <select id="t-priorita">
        <option value="molto_Alta">🔴 Molto Alta</option>
        <option value="Alta">🟠 Alta</option>
        <option value="Media" selected>🟡 Media</option>
        <option value="Bassa">🟢 Bassa</option>
      </select>
    </div>
    <div class="form-group"><label>Stato</label>
      <select id="t-stato">
        <option>Da Iniziare</option><option>In Progresso</option>
        <option>Completato</option><option>Falliti</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-task')">Annulla</button>
      <button class="btn btn-primary" onclick="saveTask()"><i class="fa fa-save"></i> Salva</button>
    </div>
  </div>
</div>

<!-- MODAL FINANZA -->
<div class="modal-bg" id="modal-finanza">
  <div class="modal">
    <div class="modal-title">Nuova Voce Finanziaria</div>
    <div class="form-group"><label>Descrizione *</label><input id="f-desc" type="text" placeholder="Es: Pagamento fornitore..."></div>
    <div class="form-group"><label>Importo (€) *</label><input id="f-importo" type="number" min="0" step="0.01" placeholder="0.00"></div>
    <div class="form-group"><label>Tipo</label>
      <select id="f-tipo">
        <option>Entrata</option><option selected>Uscita</option>
      </select>
    </div>
    <div class="form-group"><label>Data</label><input id="f-data" type="date"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-finanza')">Annulla</button>
      <button class="btn btn-primary" onclick="saveFinanza()"><i class="fa fa-save"></i> Salva</button>
    </div>
  </div>
</div>

<!-- MODAL APPUNTO -->
<div class="modal-bg" id="modal-appunto">
  <div class="modal">
    <div class="modal-title" id="modal-appunto-title">Nuovo Appunto</div>
    <input type="hidden" id="n-edit-id" value="">
    <div class="form-group"><label>Titolo *</label><input id="n-titolo" type="text" placeholder="Titolo appunto..."></div>
    <div class="form-group"><label>Contenuto</label><textarea id="n-contenuto" placeholder="Scrivi qui..."></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-appunto')">Annulla</button>
      <button class="btn btn-primary" onclick="saveAppunto()"><i class="fa fa-save"></i> Salva</button>
    </div>
  </div>
</div>

<!-- MODAL CONFIRM DELETE -->
<div class="modal-bg" id="modal-confirm">
  <div class="modal">
    <div class="modal-title">⚠️ Conferma eliminazione</div>
    <p style="color:var(--muted);margin-bottom:20px">Sei sicuro? L'operazione non può essere annullata.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-confirm')">Annulla</button>
      <button class="btn btn-danger" id="confirm-yes-btn">Elimina</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
let currentPage   = 'tasks';
let taskTab       = 'attivi';
let priorityFilter= 'Tutti';
let tipoFilter    = 'Tutti';
let searchOpen    = false;
let currentNoteId = null;
let chartStati    = null;
let chartFin      = null;

// ── NAVIGATION ──
function goPage(page, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  btn.classList.add('active');
  currentPage = page;
  loadPage(page);
  closeSearch();
}

function loadPage(page) {
  if (page === 'tasks')   loadTasks();
  if (page === 'finanze') loadFinanze();
  if (page === 'appunti') { showNotesList(); loadAppunti(); }
  if (page === 'stats')   loadStats();
}

// ── FAB ──
function openAddModal() {
  if (currentPage === 'tasks')   openTaskModal();
  if (currentPage === 'finanze') openFinanzaModal();
  if (currentPage === 'appunti') openAppuntoModal();
}

// ── SEARCH ──
function toggleSearch() {
  searchOpen = !searchOpen;
  const bar = document.getElementById('search-bar');
  bar.classList.toggle('open', searchOpen);
  if (searchOpen) document.getElementById('search-input').focus();
  else { document.getElementById('search-input').value = ''; }
}
function closeSearch() {
  searchOpen = false;
  document.getElementById('search-bar').classList.remove('open');
  document.getElementById('search-input').value = '';
}
function globalSearch(q) {
  if (!q) { loadPage(currentPage); return; }
  if (currentPage === 'tasks')   searchTasks(q);
  if (currentPage === 'appunti') searchAppunti(q);
  if (currentPage === 'finanze') searchFinanze(q);
}

// ── MODAL HELPERS ──
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function confirmDelete(cb) {
  openModal('modal-confirm');
  document.getElementById('confirm-yes-btn').onclick = () => { closeModal('modal-confirm'); cb(); };
}

// ════════════════════════════════════════════
// TASKS
// ════════════════════════════════════════════
function setTaskTab(tab, el) {
  taskTab = tab;
  document.querySelectorAll('.sub-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const showFilters = tab === 'attivi';
  document.getElementById('filters-priority').style.display = showFilters ? 'flex' : 'none';
  loadTasks();
}
function setPriorityFilter(val, el) {
  priorityFilter = val;
  document.querySelectorAll('#filters-priority .filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  loadTasks();
}

async function loadTasks(q) {
  const list = document.getElementById('tasks-list');
  list.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
  try {
    let url;
    if (taskTab === 'attivi') {
      url = `/api/tasks?priorita=${priorityFilter}`;
    } else {
      const stato = taskTab === 'completati' ? 'Completato' : 'Falliti';
      url = `/api/tasks/all?stato=${stato}`;
    }
    const res = await fetch(url);
    const tasks = await res.json();
    renderTasks(tasks, list, q);
  } catch(e) { list.innerHTML = '<div class="empty"><i class="fa fa-exclamation-circle"></i><p>Errore di connessione</p></div>'; }
}

async function searchTasks(q) {
  const list = document.getElementById('tasks-list');
  const res  = await fetch('/api/tasks');
  const all  = await res.json();
  const filtered = all.filter(t =>
    t.nome?.toLowerCase().includes(q.toLowerCase()) ||
    t.assegnato_a?.toLowerCase().includes(q.toLowerCase())
  );
  renderTasks(filtered, list, q);
}

function renderTasks(tasks, container, q) {
  if (!tasks.length) {
    container.innerHTML = '<div class="empty"><i class="fa fa-clipboard-list"></i><p>Nessun task trovato</p></div>';
    return;
  }
  container.innerHTML = tasks.map(t => {
    const g = t._giorni;
    let giorni = '';
    if (g === -1) giorni = `<span class="badge scaduto-badge">SCADUTO</span>`;
    else if (g === 9999) giorni = '';
    else if (g <= 3) giorni = `<span class="badge urgente-badge">${g}g</span>`;
    else giorni = `<span style="font-size:12px;color:var(--muted)">${g}g</span>`;

    const actions = taskTab === 'attivi' ? `
      <div class="task-actions">
        <button class="act-btn act-complete" onclick="setStato(${t._id},'Completato')"><i class="fa fa-check"></i> Completato</button>
        <button class="act-btn act-fail" onclick="setStato(${t._id},'Falliti')"><i class="fa fa-times"></i> Fallito</button>
        <button class="act-btn act-edit" onclick="openEditTask(${t._id})"><i class="fa fa-edit"></i> Modifica</button>
        <button class="act-btn act-delete" onclick="deleteTask(${t._id})"><i class="fa fa-trash"></i></button>
      </div>` : `
      <div class="task-actions">
        <button class="act-btn act-restore" onclick="setStato(${t._id},'Da Iniziare')"><i class="fa fa-rotate-left"></i> Ripristina</button>
        <button class="act-btn act-delete" onclick="deleteTask(${t._id})"><i class="fa fa-trash"></i> Elimina</button>
      </div>`;

    return `<div class="card pri-${t.priorita}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div class="card-title">${t.nome}</div>
        ${giorni}
      </div>
      <div class="row">
        <span class="badge badge-${t.priorita}">${t.priorita}</span>
        <span class="badge stato-${t.stato}">${t.stato}</span>
        ${t.assegnato_a && t.assegnato_a !== 'N/D' ? `<span style="font-size:12px;color:var(--muted)"><i class="fa fa-user"></i> ${t.assegnato_a}</span>` : ''}
        ${t.scadenza && t.scadenza !== '9999-01-01' ? `<span style="font-size:12px;color:var(--muted)"><i class="fa fa-calendar"></i> ${t.scadenza}</span>` : ''}
      </div>
      ${actions}
    </div>`;
  }).join('');
}

function openTaskModal(data, id) {
  document.getElementById('modal-task-title').textContent = data ? 'Modifica Task' : 'Nuovo Task';
  document.getElementById('task-edit-id').value = id ?? '';
  document.getElementById('t-nome').value      = data?.nome ?? '';
  document.getElementById('t-assegnato').value = data?.assegnato_a ?? 'N/D';
  document.getElementById('t-scadenza').value  = data?.scadenza ?? '';
  document.getElementById('t-priorita').value  = data?.priorita ?? 'Media';
  document.getElementById('t-stato').value     = data?.stato ?? 'Da Iniziare';
  openModal('modal-task');
  document.getElementById('t-nome').focus();
}

async function openEditTask(id) {
  const res = await fetch('/api/tasks/all');
  const all = await res.json();
  const t   = all.find(x => x._id === id);
  if (t) openTaskModal(t, id);
}

async function saveTask() {
  const nome = document.getElementById('t-nome').value.trim();
  if (!nome) { alert('Il nome del task è obbligatorio'); return; }
  const payload = {
    nome, assegnato_a: document.getElementById('t-assegnato').value,
    scadenza: document.getElementById('t-scadenza').value,
    priorita: document.getElementById('t-priorita').value,
    stato:    document.getElementById('t-stato').value
  };
  const id = document.getElementById('task-edit-id').value;
  const res = await fetch(id !== '' ? `/api/tasks/${id}` : '/api/tasks', {
    method: id !== '' ? 'PUT' : 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });
  if (res.ok) { closeModal('modal-task'); loadTasks(); }
}

async function setStato(id, stato) {
  await fetch(`/api/tasks/${id}/stato`, {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({stato})
  });
  loadTasks();
}

function deleteTask(id) {
  confirmDelete(async () => {
    await fetch(`/api/tasks/${id}`, {method:'DELETE'});
    loadTasks();
  });
}

// ════════════════════════════════════════════
// FINANZE
// ════════════════════════════════════════════
function setTipoFilter(val, el) {
  tipoFilter = val;
  document.querySelectorAll('#filters-tipo .filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  loadFinanze();
}

async function loadFinanze(q) {
  const list = document.getElementById('finanze-list');
  list.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
  try {
    const [rRes, fRes] = await Promise.all([fetch('/api/finanze/riepilogo'), fetch('/api/finanze')]);
    const r = await rRes.json();
    const all = await fRes.json();
    const mc  = r.mese_corrente;
    const saldo = mc.saldo;
    document.getElementById('fin-entrate').textContent = `+€${mc.entrate.toFixed(2)}`;
    document.getElementById('fin-uscite').textContent  = `-€${mc.uscite.toFixed(2)}`;
    const saldoEl = document.getElementById('fin-saldo');
    saldoEl.textContent = `€${saldo.toFixed(2)}`;
    saldoEl.className   = `sum-val ${saldo >= 0 ? 'tipo-Entrata' : 'tipo-Uscita'}`;

    let fin = all;
    if (tipoFilter !== 'Tutti') fin = fin.filter(f => f.tipo === tipoFilter);
    if (q) fin = fin.filter(f => f.descrizione?.toLowerCase().includes(q.toLowerCase()));
    renderFinanze(fin, list);
  } catch(e) { list.innerHTML = '<div class="empty"><i class="fa fa-exclamation-circle"></i><p>Errore</p></div>'; }
}

async function searchFinanze(q) {
  loadFinanze(q);
}

function renderFinanze(finanze, container) {
  if (!finanze.length) {
    container.innerHTML = '<div class="empty"><i class="fa fa-euro-sign"></i><p>Nessuna voce finanziaria</p></div>';
    return;
  }
  container.innerHTML = finanze.map(f => `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="card-title" style="margin:0">${f.descrizione}</div>
        <div style="font-size:18px;font-weight:700" class="tipo-${f.tipo}">
          ${f.tipo === 'Entrata' ? '+' : '-'}€${parseFloat(f.importo).toFixed(2)}
        </div>
      </div>
      <div class="row" style="margin-top:8px">
        <span class="badge stato-${f.tipo === 'Entrata' ? 'Completato' : 'Falliti'}">${f.tipo}</span>
        <span style="font-size:12px;color:var(--muted)"><i class="fa fa-calendar"></i> ${f.data}</span>
      </div>
      <div class="task-actions">
        <button class="act-btn act-delete" onclick="deleteFinanza(${f._id})"><i class="fa fa-trash"></i> Elimina</button>
      </div>
    </div>`).join('');
}

function openFinanzaModal() {
  document.getElementById('f-desc').value = '';
  document.getElementById('f-importo').value = '';
  document.getElementById('f-tipo').value = 'Uscita';
  document.getElementById('f-data').value = new Date().toISOString().split('T')[0];
  openModal('modal-finanza');
  document.getElementById('f-desc').focus();
}

async function saveFinanza() {
  const desc    = document.getElementById('f-desc').value.trim();
  const importo = document.getElementById('f-importo').value;
  if (!desc || !importo) { alert('Compila descrizione e importo'); return; }
  await fetch('/api/finanze', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      descrizione: desc,
      importo: parseFloat(importo),
      tipo: document.getElementById('f-tipo').value,
      data: document.getElementById('f-data').value
    })
  });
  closeModal('modal-finanza');
  loadFinanze();
}

function deleteFinanza(id) {
  confirmDelete(async () => {
    await fetch(`/api/finanze/${id}`, {method:'DELETE'});
    loadFinanze();
  });
}

// ════════════════════════════════════════════
// APPUNTI
// ════════════════════════════════════════════
function showNotesList() {
  document.getElementById('appunti-list').style.display = 'block';
  document.getElementById('appunto-detail').style.display = 'none';
  document.getElementById('fab').style.display = 'flex';
}
function backToNotes() { showNotesList(); loadAppunti(); }

async function loadAppunti(q) {
  const list = document.getElementById('appunti-list');
  list.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
  try {
    const res   = await fetch(`/api/appunti${q ? '?q='+encodeURIComponent(q) : ''}`);
    const notes = await res.json();
    if (!notes.length) {
      list.innerHTML = '<div class="empty"><i class="fa fa-sticky-note"></i><p>Nessun appunto</p></div>';
      return;
    }
    list.innerHTML = notes.map(n => `
      <div class="card" onclick="viewNote(${n._id})" style="cursor:pointer">
        <div class="card-title">${n.titolo}</div>
        <div style="font-size:13px;color:var(--muted);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${n.contenuto?.substring(0,80) ?? ''}</div>
        <div class="note-meta"><i class="fa fa-clock"></i> ${n.data?.substring(0,10) ?? ''}</div>
      </div>`).join('');
  } catch(e) { list.innerHTML = '<div class="empty"><p>Errore</p></div>'; }
}

async function searchAppunti(q) { loadAppunti(q); }

async function viewNote(id) {
  const res = await fetch(`/api/appunti/${id}`);
  const n   = await res.json();
  currentNoteId = id;
  document.getElementById('note-title').textContent   = n.titolo;
  document.getElementById('note-content').textContent = n.contenuto;
  document.getElementById('note-meta').textContent    = `Modificato: ${n.data?.substring(0,16) ?? ''}`;
  document.getElementById('appunti-list').style.display    = 'none';
  document.getElementById('appunto-detail').style.display  = 'block';
  document.getElementById('fab').style.display = 'none';
}

function editNoteDetail() {
  openAppuntoModal(
    {titolo: document.getElementById('note-title').textContent,
     contenuto: document.getElementById('note-content').textContent},
    currentNoteId
  );
}

function deleteNoteDetail() {
  confirmDelete(async () => {
    await fetch(`/api/appunti/${currentNoteId}`, {method:'DELETE'});
    backToNotes();
  });
}

function openAppuntoModal(data, id) {
  document.getElementById('modal-appunto-title').textContent = data ? 'Modifica Appunto' : 'Nuovo Appunto';
  document.getElementById('n-edit-id').value  = id ?? '';
  document.getElementById('n-titolo').value   = data?.titolo ?? '';
  document.getElementById('n-contenuto').value= data?.contenuto ?? '';
  openModal('modal-appunto');
  document.getElementById('n-titolo').focus();
}

async function saveAppunto() {
  const titolo = document.getElementById('n-titolo').value.trim();
  if (!titolo) { alert('Il titolo è obbligatorio'); return; }
  const id = document.getElementById('n-edit-id').value;
  await fetch(id !== '' ? `/api/appunti/${id}` : '/api/appunti', {
    method: id !== '' ? 'PUT' : 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      titolo, contenuto: document.getElementById('n-contenuto').value
    })
  });
  closeModal('modal-appunto');
  if (id !== '') viewNote(parseInt(id));
  else loadAppunti();
}

// ════════════════════════════════════════════
// STATS
// ════════════════════════════════════════════
async function loadStats() {
  try {
    const res  = await fetch('/api/stats');
    const data = await res.json();
    const t    = data.tasks;

    // Cards
    const pct = t.totale > 0 ? Math.round(t.completati/t.totale*100) : 0;
    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card"><div class="stat-val">${t.totale}</div><div class="stat-lbl">Task Totali</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--green)">${pct}%</div><div class="stat-lbl">Completamento</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--red)">${t.urgenti.length}</div><div class="stat-lbl">Urgenti</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--accent)">${t.in_progresso}</div><div class="stat-lbl">In Progresso</div></div>`;

    // Chart stati
    if (chartStati) chartStati.destroy();
    const ctxS = document.getElementById('chart-stati').getContext('2d');
    chartStati = new Chart(ctxS, {
      type: 'doughnut',
      data: {
        labels: ['Da Iniziare','In Progresso','Completati','Falliti'],
        datasets: [{
          data: [t.da_iniziare, t.in_progresso, t.completati, t.falliti],
          backgroundColor: ['#3b8beb','#f1c40f','#2ecc71','#e74c3c'],
          borderWidth: 0
        }]
      },
      options: { plugins: { legend: { labels: { color: '#e2e8f0', font: {size:12} } } } }
    });

    // Chart finanziario
    const mesi = data.andamento_finanziario;
    if (chartFin) chartFin.destroy();
    const ctxF = document.getElementById('chart-fin').getContext('2d');
    chartFin = new Chart(ctxF, {
      type: 'bar',
      data: {
        labels: mesi.map(m => m.mese),
        datasets: [
          { label: 'Entrate', data: mesi.map(m => m.entrate), backgroundColor: '#2ecc7180' },
          { label: 'Uscite',  data: mesi.map(m => m.uscite),  backgroundColor: '#e74c3c80' }
        ]
      },
      options: {
        scales: {
          x: { ticks: { color: '#7a9ab5' }, grid: { color: '#2a3d50' } },
          y: { ticks: { color: '#7a9ab5' }, grid: { color: '#2a3d50' } }
        },
        plugins: { legend: { labels: { color: '#e2e8f0' } } }
      }
    });
  } catch(e) { console.error(e); }
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  loadTasks();
  // Close modal on backdrop click
  document.querySelectorAll('.modal-bg').forEach(bg => {
    bg.addEventListener('click', e => { if (e.target === bg) bg.classList.remove('open'); });
  });
});
</script>
